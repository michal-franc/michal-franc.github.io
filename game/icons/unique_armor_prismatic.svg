<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Eldritch tendrils -->
  <path d="M3 3 Q6 7 4 11" stroke="#ffffff" stroke-width="0.7" fill="none" opacity="0.25"/>
  <path d="M28 28 Q25 24 27 21" stroke="#ffffff" stroke-width="0.7" fill="none" opacity="0.2"/>
  <!-- Incoming beam -->
  <rect x="2" y="15" width="10" height="2" rx="0.8" fill="#ffffff" opacity="0.5"/>
  <!-- Reflective surface -->
  <rect x="13" y="6" width="4" height="20" rx="1" fill="#ffffff" opacity="0.8"/>
  <!-- Reflected beams scattering -->
  <rect x="18" y="7" width="6" height="1.5" rx="0.5" fill="#ffffff" opacity="0.5" transform="rotate(-40, 21, 8)"/>
  <rect x="18" y="13" width="7" height="1.5" rx="0.5" fill="#ffffff" opacity="0.4" transform="rotate(-15, 21, 14)"/>
  <rect x="18" y="19" width="7" height="1.5" rx="0.5" fill="#ffffff" opacity="0.4" transform="rotate(15, 21, 20)"/>
  <rect x="18" y="25" width="6" height="1.5" rx="0.5" fill="#ffffff" opacity="0.5" transform="rotate(40, 21, 26)"/>
  <!-- Slit eye -->
  <ellipse cx="5" cy="5" rx="2.5" ry="3.5" fill="#ffffff" opacity="0.2"/>
  <ellipse cx="5" cy="5" rx="0.6" ry="2.5" fill="#ffffff" opacity="0.5"/>
</svg>