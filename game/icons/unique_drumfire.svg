<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Eldritch tendrils -->
  <path d="M3 2 Q6 6 4 10" stroke="#ffffff" stroke-width="0.7" fill="none" opacity="0.25"/>
  <path d="M29 28 Q26 24 28 21" stroke="#ffffff" stroke-width="0.7" fill="none" opacity="0.2"/>
  <!-- Top missile trail -->
  <rect x="2" y="6" width="4" height="2.5" rx="0.8" fill="#ffffff" opacity="0.5"/>
  <rect x="8" y="6" width="4" height="2.5" rx="0.8" fill="#ffffff" opacity="0.7"/>
  <rect x="14" y="6" width="4" height="2.5" rx="0.8" fill="#ffffff" opacity="0.8"/>
  <!-- Middle missile trail -->
  <rect x="4" y="15" width="4" height="2.5" rx="0.8" fill="#ffffff" opacity="0.5"/>
  <rect x="10" y="15" width="4" height="2.5" rx="0.8" fill="#ffffff" opacity="0.7"/>
  <rect x="16" y="15" width="4" height="2.5" rx="0.8" fill="#ffffff" opacity="0.8"/>
  <!-- Bottom missile trail -->
  <rect x="1" y="24" width="4" height="2.5" rx="0.8" fill="#ffffff" opacity="0.5"/>
  <rect x="7" y="24" width="4" height="2.5" rx="0.8" fill="#ffffff" opacity="0.7"/>
  <rect x="13" y="24" width="4" height="2.5" rx="0.8" fill="#ffffff" opacity="0.8"/>
  <!-- Top boom -->
  <circle cx="22" cy="7" r="3.5" fill="#ffffff" opacity="0.3"/>
  <circle cx="22" cy="7" r="2" fill="#ffffff" opacity="0.6"/>
  <circle cx="22" cy="7" r="0.8" fill="#ffffff"/>
  <!-- Middle boom -->
  <circle cx="24" cy="16" r="3.5" fill="#ffffff" opacity="0.3"/>
  <circle cx="24" cy="16" r="2" fill="#ffffff" opacity="0.6"/>
  <circle cx="24" cy="16" r="0.8" fill="#ffffff"/>
  <!-- Bottom boom -->
  <circle cx="21" cy="25" r="3.5" fill="#ffffff" opacity="0.3"/>
  <circle cx="21" cy="25" r="2" fill="#ffffff" opacity="0.6"/>
  <circle cx="21" cy="25" r="0.8" fill="#ffffff"/>
  <!-- Slit eye -->
  <ellipse cx="28" cy="5" rx="2.5" ry="3.5" fill="#ffffff" opacity="0.2"/>
  <ellipse cx="28" cy="5" rx="0.6" ry="2.5" fill="#ffffff" opacity="0.5"/>
</svg>