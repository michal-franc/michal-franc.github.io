<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Four modular blocks — separable units -->
  <!-- Top-left module -->
  <rect x="4" y="4" width="10" height="10" rx="1.5" fill="#ffffff" opacity="0.25"/>
  <rect x="6" y="6" width="6" height="6" rx="1" fill="#ffffff" opacity="0.5"/>
  <!-- Top-right module -->
  <rect x="18" y="4" width="10" height="10" rx="1.5" fill="#ffffff" opacity="0.25"/>
  <rect x="20" y="6" width="6" height="6" rx="1" fill="#ffffff" opacity="0.5"/>
  <!-- Bottom-left module -->
  <rect x="4" y="18" width="10" height="10" rx="1.5" fill="#ffffff" opacity="0.25"/>
  <rect x="6" y="20" width="6" height="6" rx="1" fill="#ffffff" opacity="0.5"/>
  <!-- Bottom-right module -->
  <rect x="18" y="18" width="10" height="10" rx="1.5" fill="#ffffff" opacity="0.25"/>
  <rect x="20" y="20" width="6" height="6" rx="1" fill="#ffffff" opacity="0.5"/>
  <!-- Connection traces between modules -->
  <line x1="14" y1="8" x2="18" y2="8" stroke="#ffffff" stroke-width="1" stroke-dasharray="1.5 1" opacity="0.4"/>
  <line x1="14" y1="24" x2="18" y2="24" stroke="#ffffff" stroke-width="1" stroke-dasharray="1.5 1" opacity="0.4"/>
  <line x1="8" y1="14" x2="8" y2="18" stroke="#ffffff" stroke-width="1" stroke-dasharray="1.5 1" opacity="0.4"/>
  <line x1="24" y1="14" x2="24" y2="18" stroke="#ffffff" stroke-width="1" stroke-dasharray="1.5 1" opacity="0.4"/>
  <!-- Central connection hub -->
  <circle cx="16" cy="16" r="2" fill="#ffffff" opacity="0.6"/>
  <!-- Diagonal links to hub -->
  <line x1="14" y1="14" x2="15" y2="15" stroke="#ffffff" stroke-width="0.8" opacity="0.35"/>
  <line x1="18" y1="14" x2="17" y2="15" stroke="#ffffff" stroke-width="0.8" opacity="0.35"/>
  <line x1="14" y1="18" x2="15" y2="17" stroke="#ffffff" stroke-width="0.8" opacity="0.35"/>
  <line x1="18" y1="18" x2="17" y2="17" stroke="#ffffff" stroke-width="0.8" opacity="0.35"/>
</svg>