  <path d="M10 27 Q13 23 11 20" stroke="#ffffff" stroke-width="0.7" fill="none" opacity="0.2"/>
  <path d="M28 28 Q25 24 27 21" stroke="#ffffff" stroke-width="0.7" fill="none" opacity="0.2"/>
  <!-- 3 pulse dashes -->
  <rect x="1" y="14.5" width="5" height="3" rx="1" fill="#ffffff" opacity="0.7"/>
  <rect x="8" y="14.5" width="5" height="3" rx="1" fill="#ffffff" opacity="0.8"/>
  <rect x="15" y="14.5" width="5" height="3" rx="1" fill="#ffffff" opacity="0.9"/>
  <!-- Impact burst -->
  <circle cx="24" cy="16" r="6" fill="#ffffff" opacity="0.3"/>
  <circle cx="24" cy="16" r="3.5" fill="#ffffff" opacity="0.6"/>
  <circle cx="24" cy="16" r="1.5" fill="#ffffff"/>
