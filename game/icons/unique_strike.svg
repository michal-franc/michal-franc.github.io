<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Eldritch tendrils -->
  <path d="M3 14 Q6 18 4 22 Q2 26 5 29" stroke="#ffffff" stroke-width="0.8" fill="none" opacity="0.25"/>
  <path d="M29 15 Q26 19 28 23" stroke="#ffffff" stroke-width="0.7" fill="none" opacity="0.2"/>
  <!-- Top missile trail -->
  <rect x="1" y="7" width="5" height="3" rx="1" fill="#ffffff" opacity="0.5"/>
  <rect x="8" y="7" width="5" height="3" rx="1" fill="#ffffff" opacity="0.7"/>
  <rect x="15" y="7" width="5" height="3" rx="1" fill="#ffffff" opacity="0.85"/>
  <!-- Bottom missile trail -->
  <rect x="3" y="22" width="5" height="3" rx="1" fill="#ffffff" opacity="0.5"/>
  <rect x="10" y="22" width="5" height="3" rx="1" fill="#ffffff" opacity="0.7"/>
  <rect x="17" y="22" width="5" height="3" rx="1" fill="#ffffff" opacity="0.85"/>
  <!-- Top boom -->
  <circle cx="25" cy="9" r="5" fill="#ffffff" opacity="0.3"/>
  <circle cx="25" cy="9" r="3" fill="#ffffff" opacity="0.6"/>
  <circle cx="25" cy="9" r="1.2" fill="#ffffff"/>
  <!-- Bottom boom -->
  <circle cx="26" cy="23" r="5" fill="#ffffff" opacity="0.3"/>
  <circle cx="26" cy="23" r="3" fill="#ffffff" opacity="0.6"/>
  <circle cx="26" cy="23" r="1.2" fill="#ffffff"/>
  <!-- Slit eye -->
  <ellipse cx="5" cy="3" rx="2.5" ry="3" fill="#ffffff" opacity="0.2"/>
  <ellipse cx="5" cy="3" rx="0.6" ry="2.2" fill="#ffffff" opacity="0.5"/>
</svg>