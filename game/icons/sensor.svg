<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Radar circle rings -->
  <circle cx="16" cy="16" r="14" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
  <circle cx="16" cy="16" r="9" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  <!-- Crosshair lines -->
  <line x1="16" y1="2" x2="16" y2="30" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
  <line x1="2" y1="16" x2="30" y2="16" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
  <!-- Radar sweep line -->
  <line x1="16" y1="16" x2="26" y2="6" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="2" fill="#ffffff" opacity="0.8"/>
  <!-- Ping blips -->
  <circle cx="22" cy="10" r="1.5" fill="#ffffff" opacity="0.9"/>
  <circle cx="10" cy="12" r="1.2" fill="#ffffff" opacity="0.5"/>
  <circle cx="20" cy="22" r="1" fill="#ffffff" opacity="0.4"/>
</svg>