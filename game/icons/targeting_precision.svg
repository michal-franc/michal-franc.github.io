<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Outer reticle ring — thicker, confident -->
  <circle cx="16" cy="16" r="12" fill="none" stroke="#ffffff" stroke-width="1.8" opacity="0.35"/>
  <!-- Mid reticle ring -->
  <circle cx="16" cy="16" r="8" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
  <!-- Inner precision ring — tight -->
  <circle cx="16" cy="16" r="4" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.7"/>
  <!-- Crosshair lines — fine, precise -->
  <line x1="16" y1="1" x2="16" y2="8" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
  <line x1="16" y1="24" x2="16" y2="31" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
  <line x1="1" y1="16" x2="8" y2="16" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
  <line x1="24" y1="16" x2="31" y2="16" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
  <!-- Tick marks on crosshairs — mil-dot style -->
  <line x1="15" y1="4" x2="17" y2="4" stroke="#ffffff" stroke-width="0.8" opacity="0.4"/>
  <line x1="15" y1="28" x2="17" y2="28" stroke="#ffffff" stroke-width="0.8" opacity="0.4"/>
  <line x1="4" y1="15" x2="4" y2="17" stroke="#ffffff" stroke-width="0.8" opacity="0.4"/>
  <line x1="28" y1="15" x2="28" y2="17" stroke="#ffffff" stroke-width="0.8" opacity="0.4"/>
  <!-- Bright locked dot -->
  <circle cx="16" cy="16" r="1.5" fill="#ffffff"/>
</svg>