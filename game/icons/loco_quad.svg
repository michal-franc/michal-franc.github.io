<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Spine / body bar -->
  <rect x="4" y="7" width="24" height="4" rx="2" fill="#ffffff" opacity="0.45"/>
  <!-- Head nub -->
  <rect x="25" y="5" width="5" height="5" rx="2" fill="#ffffff" opacity="0.55"/>
  <circle cx="29" cy="7" r="0.8" fill="#ffffff" opacity="0.8"/>

  <!-- Front-left leg -->
  <rect x="6" y="11" width="3.5" height="6" rx="1" fill="#ffffff" opacity="0.4"/>
  <circle cx="7.7" cy="18" r="1.2" fill="#ffffff" opacity="0.5"/>
  <rect x="6" y="19" width="3.5" height="5" rx="1" fill="#ffffff" opacity="0.4"/>
  <rect x="5" y="25" width="5.5" height="2" rx="0.8" fill="#ffffff" opacity="0.6"/>

  <!-- Front-right leg -->
  <rect x="14" y="11" width="3.5" height="6" rx="1" fill="#ffffff" opacity="0.4"/>
  <circle cx="15.7" cy="18" r="1.2" fill="#ffffff" opacity="0.5"/>
  <rect x="14" y="19" width="3.5" height="5" rx="1" fill="#ffffff" opacity="0.4"/>
  <rect x="13" y="25" width="5.5" height="2" rx="0.8" fill="#ffffff" opacity="0.6"/>

  <!-- Rear-left leg (offset behind) -->
  <rect x="18" y="11" width="3.5" height="6" rx="1" fill="#ffffff" opacity="0.3"/>
  <circle cx="19.7" cy="18" r="1.2" fill="#ffffff" opacity="0.4"/>
