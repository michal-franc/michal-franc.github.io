  <rect x="17" y="25" width="5.5" height="2" rx="0.8" fill="#ffffff" opacity="0.5"/>

  <!-- Rear-right leg -->
  <rect x="24" y="11" width="3.5" height="6" rx="1" fill="#ffffff" opacity="0.3"/>
  <circle cx="25.7" cy="18" r="1.2" fill="#ffffff" opacity="0.4"/>
  <rect x="24" y="19" width="3.5" height="5" rx="1" fill="#ffffff" opacity="0.3"/>
  <rect x="23" y="25" width="5.5" height="2" rx="0.8" fill="#ffffff" opacity="0.5"/>
