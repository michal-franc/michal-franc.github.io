<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Smaller pivot mount -->
  <rect x="10" y="5" width="12" height="2" rx="1" fill="#ffffff" opacity="0.4"/>
  <!-- Pivot point -->
  <circle cx="16" cy="7" r="1.3" fill="#ffffff" opacity="0.6"/>
  <!-- Short pendulum arm -->
  <line x1="16" y1="8" x2="16" y2="18" stroke="#ffffff" stroke-width="1.2" opacity="0.35"/>
  <!-- Smaller counterweight -->
  <circle cx="16" cy="20.5" r="3.5" fill="#ffffff" opacity="0.2"/>
  <circle cx="16" cy="20.5" r="2.2" fill="#ffffff" opacity="0.45"/>
  <circle cx="16" cy="20.5" r="1" fill="#ffffff" opacity="0.7"/>
  <!-- Dashed swing arc — limited range -->
  <path d="M10 21 A6 6 0 0 1 22 21" fill="none" stroke="#ffffff" stroke-width="0.7" stroke-dasharray="2 2" opacity="0.2"/>
</svg>