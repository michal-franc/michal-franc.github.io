<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Two heatsink plates with dot pattern inside -->
  <!-- Bottom plate -->
  <rect x="4" y="24" width="24" height="4" rx="1" fill="#ffffff" opacity="0.8"/>
  <circle cx="8" cy="26" r="0.8" fill="#06070c" opacity="0.6"/>
  <circle cx="12" cy="26" r="0.8" fill="#06070c" opacity="0.6"/>
  <circle cx="16" cy="26" r="0.8" fill="#06070c" opacity="0.6"/>
  <circle cx="20" cy="26" r="0.8" fill="#06070c" opacity="0.6"/>
  <circle cx="24" cy="26" r="0.8" fill="#06070c" opacity="0.6"/>
  <!-- Top plate -->
  <rect x="4" y="19" width="24" height="4" rx="1" fill="#ffffff" opacity="0.6"/>
  <circle cx="8" cy="21" r="0.8" fill="#06070c" opacity="0.6"/>
  <circle cx="12" cy="21" r="0.8" fill="#06070c" opacity="0.6"/>
  <circle cx="16" cy="21" r="0.8" fill="#06070c" opacity="0.6"/>
  <circle cx="20" cy="21" r="0.8" fill="#06070c" opacity="0.6"/>
  <circle cx="24" cy="21" r="0.8" fill="#06070c" opacity="0.6"/>
  <!-- Wavy heat lines rising -->
  <path d="M8 17 Q10 15 8 13 Q6 11 8 9" stroke="#ffffff" stroke-width="1.8" fill="none" opacity="0.6"/>
  <path d="M16 17 Q18 15 16 13 Q14 11 16 9" stroke="#ffffff" stroke-width="1.8" fill="none" opacity="0.6"/>
  <path d="M24 17 Q26 15 24 13 Q22 11 24 9" stroke="#ffffff" stroke-width="1.8" fill="none" opacity="0.6"/>
  <!-- Upper fading tips -->
  <path d="M8 7 Q10 5 8 3" stroke="#ffffff" stroke-width="1.5" fill="none" opacity="0.3"/>
  <path d="M16 7 Q18 5 16 3" stroke="#ffffff" stroke-width="1.5" fill="none" opacity="0.3"/>
  <path d="M24 7 Q26 5 24 3" stroke="#ffffff" stroke-width="1.5" fill="none" opacity="0.3"/>
</svg>