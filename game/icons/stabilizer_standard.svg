<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Pivot mount bar at top -->
  <rect x="8" y="3" width="16" height="2.5" rx="1" fill="#ffffff" opacity="0.5"/>
  <!-- Pivot point -->
  <circle cx="16" cy="5.5" r="1.8" fill="#ffffff" opacity="0.7"/>
  <!-- Pendulum arm -->
  <line x1="16" y1="7" x2="16" y2="22" stroke="#ffffff" stroke-width="1.5" opacity="0.45"/>
  <!-- Counterweight — centered, balanced -->
  <circle cx="16" cy="24" r="5" fill="#ffffff" opacity="0.25"/>
  <circle cx="16" cy="24" r="3.2" fill="#ffffff" opacity="0.5"/>
  <circle cx="16" cy="24" r="1.5" fill="#ffffff" opacity="0.8"/>
  <!-- Plumb lines — showing true vertical -->
  <line x1="10" y1="10" x2="10" y2="18" stroke="#ffffff" stroke-width="0.5" stroke-dasharray="1.5 2" opacity="0.15"/>
  <line x1="22" y1="10" x2="22" y2="18" stroke="#ffffff" stroke-width="0.5" stroke-dasharray="1.5 2" opacity="0.15"/>
</svg>