<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Outer range ring — extended reach -->
  <circle cx="16" cy="16" r="14" fill="none" stroke="#ffffff" stroke-width="1" stroke-dasharray="3 2" opacity="0.2"/>
  <!-- Mid range ring -->
  <circle cx="16" cy="16" r="10" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.3"/>
  <!-- Inner reticle -->
  <circle cx="16" cy="16" r="5" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.5"/>
  <!-- Horizontal crosshair — range scale with tick marks -->
  <line x1="2" y1="16" x2="11" y2="16" stroke="#ffffff" stroke-width="1" opacity="0.4"/>
  <line x1="21" y1="16" x2="30" y2="16" stroke="#ffffff" stroke-width="1" opacity="0.4"/>
  <!-- Range tick marks along horizontal -->
  <line x1="4" y1="14.5" x2="4" y2="17.5" stroke="#ffffff" stroke-width="0.8" opacity="0.3"/>
  <line x1="7" y1="15" x2="7" y2="17" stroke="#ffffff" stroke-width="0.8" opacity="0.3"/>
  <line x1="25" y1="15" x2="25" y2="17" stroke="#ffffff" stroke-width="0.8" opacity="0.3"/>
  <line x1="28" y1="14.5" x2="28" y2="17.5" stroke="#ffffff" stroke-width="0.8" opacity="0.3"/>
  <!-- Vertical crosshair -->
  <line x1="16" y1="2" x2="16" y2="11" stroke="#ffffff" stroke-width="1" opacity="0.35"/>
  <line x1="16" y1="21" x2="16" y2="30" stroke="#ffffff" stroke-width="1" opacity="0.35"/>
  <!-- Range extension arrows — outward pointing -->
  <path d="M29 16 L31 14.5 M29 16 L31 17.5" stroke="#ffffff" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M3 16 L1 14.5 M3 16 L1 17.5" stroke="#ffffff" stroke-width="1" fill="none" opacity="0.6"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.5" fill="#ffffff" opacity="0.8"/>
</svg>