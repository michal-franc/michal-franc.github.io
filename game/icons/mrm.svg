  <circle cx="19" cy="8" r="2" fill="#ffffff" opacity="0.5"/>
  <circle cx="19" cy="8" r="0.8" fill="#ffffff"/>
  <circle cx="25" cy="14" r="3.5" fill="#ffffff" opacity="0.2"/>
  <circle cx="25" cy="14" r="2" fill="#ffffff" opacity="0.5"/>
  <circle cx="25" cy="14" r="0.8" fill="#ffffff"/>
  <circle cx="19" cy="19.5" r="3.5" fill="#ffffff" opacity="0.2"/>
  <circle cx="19" cy="19.5" r="2" fill="#ffffff" opacity="0.5"/>
  <circle cx="19" cy="19.5" r="0.8" fill="#ffffff"/>
  <circle cx="25" cy="25" r="3.5" fill="#ffffff" opacity="0.2"/>
  <circle cx="25" cy="25" r="2" fill="#ffffff" opacity="0.5"/>
  <circle cx="25" cy="25" r="0.8" fill="#ffffff"/>
</svg>