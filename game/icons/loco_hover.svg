  <!-- Front viewport -->
  <rect x="12" y="6" width="8" height="2" rx="0.8" fill="#ffffff" opacity="0.75"/>
  <!-- Skirt / hover plenum -->
  <path d="M3 18 L3 21 Q8 23 16 23 Q24 23 29 21 L29 18 Z" fill="#ffffff" opacity="0.3"/>
