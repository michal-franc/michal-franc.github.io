  <ellipse cx="10" cy="24" rx="3" ry="1.5" fill="#ffffff" opacity="0.4"/>
  <ellipse cx="22" cy="24" rx="3" ry="1.5" fill="#ffffff" opacity="0.4"/>
  <ellipse cx="16" cy="24.5" rx="4" ry="1.5" fill="#ffffff" opacity="0.25"/>
  <!-- Ground effect ripples -->
  <ellipse cx="16" cy="28" rx="12" ry="1.5" fill="none" stroke="#ffffff" stroke-width="0.7" opacity="0.2"/>
  <ellipse cx="16" cy="30" rx="10" ry="1" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.12"/>
