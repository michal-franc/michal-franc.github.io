<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- X mark badge (top-right) -->
  <line x1="24" y1="2" x2="30" y2="8" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
  <line x1="30" y1="2" x2="24" y2="8" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>

  <!-- Muzzle flash -->
  <circle cx="8" cy="16" r="6" fill="#ffffff" opacity="0.3"/>
  <circle cx="8" cy="16" r="3.5" fill="#ffffff" opacity="0.6"/>
  <circle cx="8" cy="16" r="1.5" fill="#ffffff"/>
  <!-- Two wide shell dashes -->
  <rect x="15" y="13" width="7" height="6" rx="1.5" fill="#ffffff" opacity="0.9"/>
  <rect x="24" y="13" width="7" height="6" rx="1.5" fill="#ffffff" opacity="0.7"/>
</svg>