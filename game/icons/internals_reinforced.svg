<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Shielded central processor — thick, solid -->
  <rect x="11" y="11" width="10" height="10" rx="1.5" fill="#ffffff" opacity="0.3"/>
  <rect x="12.5" y="12.5" width="7" height="7" rx="1" fill="#ffffff" opacity="0.6"/>
  <rect x="14" y="14" width="4" height="4" rx="0.5" fill="#ffffff" opacity="0.9"/>
  <!-- Thick hardened traces -->
  <line x1="4" y1="14" x2="11" y2="14" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
  <line x1="4" y1="18" x2="11" y2="18" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
  <line x1="21" y1="14" x2="28" y2="14" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
  <line x1="21" y1="18" x2="28" y2="18" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
  <line x1="14" y1="4" x2="14" y2="11" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
  <line x1="18" y1="4" x2="18" y2="11" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
  <line x1="14" y1="21" x2="14" y2="28" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
  <line x1="18" y1="21" x2="18" y2="28" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
  <!-- Heavy connection nodes -->
  <circle cx="4" cy="14" r="2" fill="#ffffff" opacity="0.7"/>
  <circle cx="4" cy="18" r="2" fill="#ffffff" opacity="0.7"/>
  <circle cx="28" cy="14" r="2" fill="#ffffff" opacity="0.7"/>
  <circle cx="28" cy="18" r="2" fill="#ffffff" opacity="0.7"/>
  <circle cx="14" cy="4" r="2" fill="#ffffff" opacity="0.7"/>
  <circle cx="18" cy="4" r="2" fill="#ffffff" opacity="0.7"/>
  <circle cx="14" cy="28" r="2" fill="#ffffff" opacity="0.7"/>
  <circle cx="18" cy="28" r="2" fill="#ffffff" opacity="0.7"/>
</svg>