  <rect x="7" y="14" width="3" height="2" rx="0.8" fill="#ffffff" opacity="0.5" transform="rotate(-35, 8.5, 15)"/>
  <rect x="12" y="10" width="3" height="2" rx="0.8" fill="#ffffff" opacity="0.6" transform="rotate(-15, 13.5, 11)"/>
  <rect x="17" y="9" width="3" height="2" rx="0.8" fill="#ffffff" opacity="0.7" transform="rotate(5, 18.5, 10)"/>
  <rect x="21" y="11" width="3" height="2" rx="0.8" fill="#ffffff" opacity="0.8" transform="rotate(25, 22.5, 12)"/>
  <!-- Impact burst -->
  <circle cx="27" cy="20" r="5" fill="#ffffff" opacity="0.3"/>
  <circle cx="27" cy="20" r="3" fill="#ffffff" opacity="0.6"/>
  <circle cx="27" cy="20" r="1.2" fill="#ffffff"/>
