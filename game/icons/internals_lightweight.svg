<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Lightweight central processor — thin outline -->
  <rect x="12.5" y="12.5" width="7" height="7" rx="1" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.6"/>
  <rect x="14" y="14" width="4" height="4" rx="0.5" fill="#ffffff" opacity="0.5"/>
  <!-- Fewer traces — only essentials, thin -->
  <line x1="5" y1="16" x2="12.5" y2="16" stroke="#ffffff" stroke-width="1" opacity="0.35"/>
  <line x1="19.5" y1="16" x2="27" y2="16" stroke="#ffffff" stroke-width="1" opacity="0.35"/>
  <line x1="16" y1="5" x2="16" y2="12.5" stroke="#ffffff" stroke-width="1" opacity="0.35"/>
  <line x1="16" y1="19.5" x2="16" y2="27" stroke="#ffffff" stroke-width="1" opacity="0.35"/>
  <!-- Diagonal minimal traces -->
  <line x1="8" y1="8" x2="12.5" y2="12.5" stroke="#ffffff" stroke-width="0.8" opacity="0.25"/>
  <line x1="24" y1="24" x2="19.5" y2="19.5" stroke="#ffffff" stroke-width="0.8" opacity="0.25"/>
  <!-- Sparse nodes -->
  <circle cx="5" cy="16" r="1.3" fill="#ffffff" opacity="0.5"/>
  <circle cx="27" cy="16" r="1.3" fill="#ffffff" opacity="0.5"/>
  <circle cx="16" cy="5" r="1.3" fill="#ffffff" opacity="0.5"/>
  <circle cx="16" cy="27" r="1.3" fill="#ffffff" opacity="0.5"/>
  <circle cx="8" cy="8" r="1" fill="#ffffff" opacity="0.4"/>
  <circle cx="24" cy="24" r="1" fill="#ffffff" opacity="0.4"/>
</svg>