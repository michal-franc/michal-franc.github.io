<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Outer reticle ring -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.3"/>
  <!-- Inner reticle ring -->
  <circle cx="16" cy="16" r="6" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
  <!-- Crosshair lines (gaps in center) -->
  <line x1="16" y1="2" x2="16" y2="10" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
  <line x1="16" y1="22" x2="16" y2="30" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
  <line x1="2" y1="16" x2="10" y2="16" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
  <line x1="22" y1="16" x2="30" y2="16" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
  <!-- Locked target dot -->
  <circle cx="16" cy="16" r="2" fill="#ffffff"/>
</svg>