<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Pentagram badge (top-right) -->
  <circle cx="27" cy="5" r="4" stroke="#ffffff" stroke-width="0.8" fill="none" opacity="0.5"/>
  <polygon points="27,1 28.2,4.2 31,4.2 28.8,6.2 29.6,9 27,7.2 24.4,9 25.2,6.2 23,4.2 25.8,4.2" stroke="#ffffff" stroke-width="0.6" fill="none" opacity="0.7"/>

  <!-- Muzzle flash -->
