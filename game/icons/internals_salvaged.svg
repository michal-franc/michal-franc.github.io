<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Battered processor — offset, uneven -->
  <rect x="12" y="12.5" width="8.5" height="7.5" rx="1" fill="#ffffff" opacity="0.4"/>
  <rect x="13.5" y="14" width="4.5" height="4" rx="0.5" fill="#ffffff" opacity="0.25"/>
  <!-- Messy traces — uneven thickness, some broken -->
  <line x1="5" y1="14" x2="12" y2="14" stroke="#ffffff" stroke-width="1.4" opacity="0.3"/>
  <line x1="5" y1="18.5" x2="10" y2="18.5" stroke="#ffffff" stroke-width="1" opacity="0.25"/>
  <!-- gap in trace -->
  <line x1="11.5" y1="18.5" x2="12" y2="18.5" stroke="#ffffff" stroke-width="1" opacity="0.25"/>
  <line x1="20.5" y1="13.5" x2="27" y2="13.5" stroke="#ffffff" stroke-width="1.5" opacity="0.3"/>
  <line x1="20.5" y1="18" x2="26" y2="18" stroke="#ffffff" stroke-width="0.8" opacity="0.2"/>
  <line x1="14.5" y1="5" x2="14.5" y2="12.5" stroke="#ffffff" stroke-width="1.2" opacity="0.3"/>
  <line x1="17.5" y1="6" x2="17.5" y2="12.5" stroke="#ffffff" stroke-width="1" opacity="0.25"/>
  <line x1="14" y1="20" x2="14" y2="27" stroke="#ffffff" stroke-width="1.3" opacity="0.3"/>
  <!-- broken vertical trace -->
  <line x1="18" y1="20" x2="18" y2="23" stroke="#ffffff" stroke-width="0.8" opacity="0.2"/>
  <line x1="18" y1="24.5" x2="18" y2="27" stroke="#ffffff" stroke-width="0.8" opacity="0.2"/>
  <!-- Uneven nodes — different sizes -->
  <circle cx="5" cy="14" r="1.8" fill="#ffffff" opacity="0.5"/>
  <circle cx="27" cy="13.5" r="1.5" fill="#ffffff" opacity="0.4"/>
  <circle cx="14.5" cy="5" r="1.3" fill="#ffffff" opacity="0.45"/>
  <circle cx="14" cy="27" r="1.7" fill="#ffffff" opacity="0.5"/>
  <circle cx="17.5" cy="6" r="1" fill="#ffffff" opacity="0.3"/>
  <!-- Patch/solder marks -->
  <circle cx="10.5" cy="18.5" r="0.8" fill="#ffffff" opacity="0.4"/>
  <line x1="25" y1="16" x2="26.5" y2="15" stroke="#ffffff" stroke-width="0.7" opacity="0.2"/>
  <line x1="25.5" y1="16.5" x2="26" y2="15" stroke="#ffffff" stroke-width="0.5" opacity="0.2"/>
</svg>