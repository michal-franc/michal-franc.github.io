<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Outer reticle ring -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.25"/>
  <!-- Inner reticle ring -->
  <circle cx="16" cy="16" r="6" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.45"/>
  <!-- Crosshair lines -->
  <line x1="16" y1="2" x2="16" y2="10" stroke="#ffffff" stroke-width="1" opacity="0.35"/>
  <line x1="16" y1="22" x2="16" y2="30" stroke="#ffffff" stroke-width="1" opacity="0.35"/>
  <line x1="2" y1="16" x2="10" y2="16" stroke="#ffffff" stroke-width="1" opacity="0.35"/>
  <line x1="22" y1="16" x2="30" y2="16" stroke="#ffffff" stroke-width="1" opacity="0.35"/>
  <!-- Current target position -->
  <circle cx="13" cy="16" r="1.5" fill="#ffffff" opacity="0.5"/>
  <!-- Prediction arrow — dashed trail showing where target is heading -->
  <line x1="14.5" y1="16" x2="21" y2="13" stroke="#ffffff" stroke-width="1" stroke-dasharray="2 1.5" opacity="0.4"/>
  <!-- Predicted future position — lead indicator -->
  <circle cx="22" cy="12.5" r="2" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.8"/>
  <circle cx="22" cy="12.5" r="0.8" fill="#ffffff" opacity="0.9"/>
  <!-- Motion trail dots behind current position -->
  <circle cx="10" cy="17.5" r="0.8" fill="#ffffff" opacity="0.2"/>
  <circle cx="8" cy="18.5" r="0.6" fill="#ffffff" opacity="0.15"/>
</svg>