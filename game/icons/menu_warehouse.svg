<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Bottom row - 2 large crates -->
  <rect x="3" y="20" width="12" height="10" rx="1" fill="#ffffff" opacity="0.5"/>
  <rect x="17" y="20" width="12" height="10" rx="1" fill="#ffffff" opacity="0.6"/>
  <!-- Bottom crate detail lines -->
  <line x1="9" y1="21" x2="9" y2="29" stroke="#ffffff" stroke-width="0.8" opacity="0.25"/>
  <line x1="23" y1="21" x2="23" y2="29" stroke="#ffffff" stroke-width="0.8" opacity="0.3"/>
  <!-- Middle row - 2 crates -->
  <rect x="3" y="10" width="12" height="9" rx="1" fill="#ffffff" opacity="0.4"/>
  <rect x="17" y="10" width="12" height="9" rx="1" fill="#ffffff" opacity="0.45"/>
  <!-- Middle crate detail lines -->
  <line x1="9" y1="11" x2="9" y2="18" stroke="#ffffff" stroke-width="0.8" opacity="0.2"/>
  <line x1="23" y1="11" x2="23" y2="18" stroke="#ffffff" stroke-width="0.8" opacity="0.2"/>
  <!-- Top row - 1 crate centered -->
  <rect x="8" y="2" width="16" height="7" rx="1" fill="#ffffff" opacity="0.3"/>
  <line x1="16" y1="3" x2="16" y2="8" stroke="#ffffff" stroke-width="0.8" opacity="0.15"/>
  <!-- Crate markings - small horizontal bands -->
  <line x1="5" y1="24" x2="13" y2="24" stroke="#ffffff" stroke-width="0.6" opacity="0.2"/>
  <line x1="19" y1="24" x2="27" y2="24" stroke="#ffffff" stroke-width="0.6" opacity="0.25"/>
  <line x1="5" y1="14" x2="13" y2="14" stroke="#ffffff" stroke-width="0.6" opacity="0.15"/>
  <line x1="19" y1="14" x2="27" y2="14" stroke="#ffffff" stroke-width="0.6" opacity="0.15"/>
</svg>