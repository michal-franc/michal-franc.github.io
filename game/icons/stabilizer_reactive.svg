<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Pivot mount -->
  <rect x="8" y="3" width="16" height="2.5" rx="1" fill="#ffffff" opacity="0.5"/>
  <!-- Pivot point -->
  <circle cx="16" cy="5.5" r="1.8" fill="#ffffff" opacity="0.7"/>
  <!-- Pendulum swung to side — caught mid-swing -->
  <line x1="16" y1="7" x2="21" y2="20" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>
  <!-- Counterweight — off center -->
  <circle cx="22.5" cy="23" r="4" fill="#ffffff" opacity="0.2"/>
  <circle cx="22.5" cy="23" r="2.5" fill="#ffffff" opacity="0.45"/>
  <circle cx="22.5" cy="23" r="1.2" fill="#ffffff" opacity="0.75"/>
  <!-- Snap-back arrow — correcting fast -->
  <path d="M20 21 A8 8 0 0 0 13 25" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.6"/>
  <path d="M13 25 L14.5 23 M13 25 L11.5 24" stroke="#ffffff" stroke-width="0.8" fill="none" opacity="0.5"/>
  <!-- Ghost center line — where it wants to be -->
  <line x1="16" y1="7" x2="16" y2="26" stroke="#ffffff" stroke-width="0.5" stroke-dasharray="2 2" opacity="0.15"/>
  <!-- Speed marks -->
  <line x1="7" y1="22" x2="10" y2="22" stroke="#ffffff" stroke-width="0.6" opacity="0.2"/>
  <line x1="8" y1="24" x2="10.5" y2="24" stroke="#ffffff" stroke-width="0.6" opacity="0.15"/>
</svg>