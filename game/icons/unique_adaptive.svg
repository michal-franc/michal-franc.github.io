<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Eldritch tendrils -->
  <path d="M2 2 Q5 6 3 10" stroke="#ffffff" stroke-width="0.7" fill="none" opacity="0.25"/>
  <path d="M30 28 Q27 24 29 21" stroke="#ffffff" stroke-width="0.7" fill="none" opacity="0.2"/>
  <!-- 4 parallel trails -->
  <rect x="2" y="7" width="10" height="2.5" rx="0.5" fill="#ffffff" opacity="0.5"/>
  <rect x="2" y="12.5" width="10" height="2.5" rx="0.5" fill="#ffffff" opacity="0.6"/>
  <rect x="2" y="18" width="10" height="2.5" rx="0.5" fill="#ffffff" opacity="0.6"/>
  <rect x="2" y="23.5" width="10" height="2.5" rx="0.5" fill="#ffffff" opacity="0.5"/>
  <!-- 4 booms -->
  <circle cx="19" cy="8" r="3.5" fill="#ffffff" opacity="0.2"/>
  <circle cx="19" cy="8" r="2" fill="#ffffff" opacity="0.5"/>
  <circle cx="19" cy="8" r="0.8" fill="#ffffff"/>
  <circle cx="25" cy="14" r="3.5" fill="#ffffff" opacity="0.2"/>
  <circle cx="25" cy="14" r="2" fill="#ffffff" opacity="0.5"/>
  <circle cx="25" cy="14" r="0.8" fill="#ffffff"/>
  <circle cx="19" cy="19.5" r="3.5" fill="#ffffff" opacity="0.2"/>
  <circle cx="19" cy="19.5" r="2" fill="#ffffff" opacity="0.5"/>
  <circle cx="19" cy="19.5" r="0.8" fill="#ffffff"/>
  <circle cx="25" cy="25" r="3.5" fill="#ffffff" opacity="0.2"/>
  <circle cx="25" cy="25" r="2" fill="#ffffff" opacity="0.5"/>
  <circle cx="25" cy="25" r="0.8" fill="#ffffff"/>
  <!-- Slit eye -->
  <ellipse cx="5" cy="3" rx="2.5" ry="3" fill="#ffffff" opacity="0.2"/>
  <ellipse cx="5" cy="3" rx="0.6" ry="2.2" fill="#ffffff" opacity="0.5"/>
</svg>