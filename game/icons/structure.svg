<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Top horizontal member -->
  <rect x="4" y="7" width="24" height="2.5" rx="1" fill="#ffffff" opacity="0.6"/>
  <!-- Bottom horizontal member -->
  <rect x="4" y="22" width="24" height="2.5" rx="1" fill="#ffffff" opacity="0.6"/>
  <!-- Diagonal cross-braces -->
  <line x1="6" y1="9.5" x2="16" y2="22" stroke="#ffffff" stroke-width="1.5" opacity="0.3"/>
  <line x1="16" y1="9.5" x2="6" y2="22" stroke="#ffffff" stroke-width="1.5" opacity="0.3"/>
  <line x1="16" y1="9.5" x2="26" y2="22" stroke="#ffffff" stroke-width="1.5" opacity="0.3"/>
  <line x1="26" y1="9.5" x2="16" y2="22" stroke="#ffffff" stroke-width="1.5" opacity="0.3"/>
  <!-- Joint nodes -->
  <circle cx="6" cy="8" r="2" fill="#ffffff"/>
  <circle cx="16" cy="8" r="2" fill="#ffffff"/>
  <circle cx="26" cy="8" r="2" fill="#ffffff"/>
  <circle cx="6" cy="23" r="2" fill="#ffffff"/>
  <circle cx="16" cy="23" r="2" fill="#ffffff"/>
  <circle cx="26" cy="23" r="2" fill="#ffffff"/>
</svg>