<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Wide heavy pivot mount -->
  <rect x="5" y="3" width="22" height="3" rx="1.5" fill="#ffffff" opacity="0.5"/>
  <!-- Pivot point -->
  <circle cx="16" cy="6.5" r="2" fill="#ffffff" opacity="0.75"/>
  <!-- Thick pendulum arm -->
  <line x1="16" y1="8.5" x2="16" y2="19" stroke="#ffffff" stroke-width="2" opacity="0.45"/>
  <!-- Heavy counterweight — extra mass -->
  <circle cx="16" cy="23" r="6" fill="#ffffff" opacity="0.2"/>
  <circle cx="16" cy="23" r="4" fill="#ffffff" opacity="0.45"/>
  <circle cx="16" cy="23" r="2" fill="#ffffff" opacity="0.75"/>
  <!-- Impact sparks at weight — melee energy stored -->
  <line x1="10" y1="19" x2="8" y2="17.5" stroke="#ffffff" stroke-width="0.9" opacity="0.4"/>
  <line x1="22" y1="19" x2="24" y2="17.5" stroke="#ffffff" stroke-width="0.9" opacity="0.4"/>
  <line x1="10" y1="27" x2="8" y2="28.5" stroke="#ffffff" stroke-width="0.9" opacity="0.4"/>
  <line x1="22" y1="27" x2="24" y2="28.5" stroke="#ffffff" stroke-width="0.9" opacity="0.4"/>
  <!-- Wrecking ball energy — the weight IS the weapon -->
  <circle cx="16" cy="23" r="7.5" fill="none" stroke="#ffffff" stroke-width="0.7" opacity="0.15"/>
</svg>