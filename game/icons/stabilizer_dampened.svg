<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Pivot mount -->
  <rect x="8" y="3" width="16" height="2.5" rx="1" fill="#ffffff" opacity="0.5"/>
  <!-- Pivot point -->
  <circle cx="16" cy="5.5" r="1.8" fill="#ffffff" opacity="0.7"/>
  <!-- Pendulum arm with spring section — zigzag absorber mid-arm -->
  <line x1="16" y1="7" x2="16" y2="10" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>
  <path d="M16 10 L14 11.5 L18 13 L14 14.5 L18 16 L16 17" stroke="#ffffff" stroke-width="1.2" fill="none" opacity="0.45"/>
  <line x1="16" y1="17" x2="16" y2="21" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>
  <!-- Counterweight -->
  <circle cx="16" cy="24" r="5" fill="#ffffff" opacity="0.25"/>
  <circle cx="16" cy="24" r="3" fill="#ffffff" opacity="0.5"/>
  <circle cx="16" cy="24" r="1.3" fill="#ffffff" opacity="0.8"/>
  <!-- Fading oscillation arcs — damped motion -->
  <path d="M9 24 A7 7 0 0 1 11 18" fill="none" stroke="#ffffff" stroke-width="0.7" opacity="0.2"/>
  <path d="M23 24 A7 7 0 0 0 21 18" fill="none" stroke="#ffffff" stroke-width="0.7" opacity="0.2"/>
</svg>