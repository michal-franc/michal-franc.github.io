<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Eldritch tendrils -->
  <path d="M3 3 Q6 7 4 11 Q2 15 5 18" stroke="#ffffff" stroke-width="0.8" fill="none" opacity="0.25"/>
  <path d="M29 27 Q26 23 28 20" stroke="#ffffff" stroke-width="0.7" fill="none" opacity="0.2"/>
  <!-- Muzzle flash -->
  <circle cx="5" cy="16" r="4" fill="#ffffff" opacity="0.3"/>
  <circle cx="5" cy="16" r="2.5" fill="#ffffff" opacity="0.6"/>
  <circle cx="5" cy="16" r="1" fill="#ffffff"/>
  <!-- Scattered shards -->
  <rect x="10" y="6" width="4" height="2.5" rx="0.5" fill="#ffffff" opacity="0.4"/>
  <rect x="14" y="10" width="5" height="2.5" rx="0.5" fill="#ffffff" opacity="0.5"/>
  <rect x="12" y="15" width="5" height="2.5" rx="0.5" fill="#ffffff" opacity="0.7"/>
  <rect x="15" y="20" width="4" height="2.5" rx="0.5" fill="#ffffff" opacity="0.5"/>
  <rect x="11" y="25" width="4" height="2.5" rx="0.5" fill="#ffffff" opacity="0.4"/>
  <!-- Far scattered shards -->
  <rect x="21" y="4" width="3" height="2" rx="0.5" fill="#ffffff" opacity="0.3"/>
  <rect x="23" y="11" width="3" height="2" rx="0.5" fill="#ffffff" opacity="0.4"/>
  <rect x="24" y="19" width="3" height="2" rx="0.5" fill="#ffffff" opacity="0.4"/>
  <rect x="22" y="26" width="3" height="2" rx="0.5" fill="#ffffff" opacity="0.3"/>
  <!-- Slit eye -->
  <ellipse cx="27" cy="5" rx="2.5" ry="3.5" fill="#ffffff" opacity="0.2"/>
  <ellipse cx="27" cy="5" rx="0.6" ry="2.5" fill="#ffffff" opacity="0.5"/>
</svg>